<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Outfitr Extension Settings</title>
  <script type="module" crossorigin src="/chunks/options-Bz3m7lPV.js"></script>
  <link rel="modulepreload" crossorigin href="/chunks/auth-CZe-TDDt.js">
  <link rel="stylesheet" crossorigin href="/assets/options-BfVg1FQQ.css">
</head>
<body>
  <div id="app" class="container">
    <header>
      <h1>Outfitr Scan</h1>
      <p class="subtitle">Extension Settings</p>
    </header>

    <section>
      <div class="setting-row">
        <div class="setting-info">
          <p class="setting-label">Auto-Connect</p>
          <p class="setting-desc">Automatically connect to your Outfitr account when you click "Connect".</p>
        </div>
        <label class="toggle">
          <input id="auto-connect-toggle" type="checkbox">
          <span class="slider"></span>
        </label>
      </div>
    </section>

    <section>
      <h2>Connection</h2>
      <div id="connection-status" class="status-card">
        <div class="status-dot offline" id="status-dot"></div>
        <div>
          <p id="status-text" class="status-text">Checking...</p>
          <p id="status-email" class="status-email"></p>
        </div>
      </div>
      <button id="disconnect-btn" class="btn btn-danger hidden">Disconnect</button>
    </section>

    <section>
      <h2>Quick Links</h2>
      <a id="open-settings-link" href="#" class="link-row">
        <span class="link-icon">⚙</span>
        <span>Scan Settings (Web App)</span>
      </a>
      <a id="open-history-link" href="#" class="link-row">
        <span class="link-icon">📋</span>
        <span>Scan History</span>
      </a>
    </section>

    <footer>
      <p class="footer-text">Outfitr v1.0.0</p>
    </footer>
  </div>
</body>
</html>
